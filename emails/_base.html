<!--
  AquaFlow — Base Email Layout
  All emails extend this structure.
  Replace {{CONTENT}} with each email's body block.
  Replace {{PREVIEW_TEXT}} with a short preview line.
  For Supabase templates, replace {{ .Variable }} tokens as needed.
-->
<!DOCTYPE html>
<html lang="en" xmlns:v="urn:schemas-microsoft-com:vml">
<head>
  <meta charset="utf-8">
  <meta name="x-apple-disable-message-reformatting">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no, url=no">
  <!--[if mso]>
  <noscript><xml><o:OfficeDocumentSettings>
    <o:PixelsPerInch>96</o:PixelsPerInch>
  </o:OfficeDocumentSettings></xml></noscript>
  <![endif]-->
  <style>
    /* Reset */
    *,::after,::before{box-sizing:border-box}
    body,html{margin:0;padding:0;width:100%}
    a{color:inherit}
    img{border:0;max-width:100%;vertical-align:middle}
    table{border-collapse:collapse}
    td{padding:0}

    /* Responsive */
    @media (max-width:600px){
      .email-wrapper  { padding:16px !important }
      .email-body     { padding:28px 20px !important }
      .btn-main       { display:block !important;width:100% !important }
      .hide-mobile    { display:none !important }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased">

<!-- Preview text (hidden) -->
<div style="display:none;max-height:0;overflow:hidden;mso-hide:all">{{PREVIEW_TEXT}}&nbsp;&#8199;&#65279;&#847;</div>

<!-- Outer wrapper -->
<table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#f1f5f9">
  <tr>
    <td align="center" class="email-wrapper" style="padding:40px 16px">

      <!-- Card -->
      <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="max-width:600px">

        <!-- ── Header ── -->
        <tr>
          <td style="background-color:#0f4c81;border-radius:16px 16px 0 0;padding:28px 40px;text-align:center">
            <!-- Logo mark -->
            <table cellpadding="0" cellspacing="0" role="presentation" style="margin:0 auto 12px">
              <tr>
                <td style="background:#ffffff;border-radius:14px;width:56px;height:56px;text-align:center;vertical-align:middle;font-size:28px;line-height:56px">
                  💧
                </td>
              </tr>
            </table>
            <!-- App name -->
            <p style="margin:0;font-size:22px;font-weight:700;color:#ffffff;letter-spacing:-0.3px">AquaFlow</p>
            <p style="margin:4px 0 0;font-size:12px;color:#93c5fd;letter-spacing:0.5px;text-transform:uppercase">Water Delivery Management</p>
          </td>
        </tr>

        <!-- ── Body ── -->
        <tr>
          <td class="email-body" style="background:#ffffff;padding:40px;color:#1e293b">
            {{CONTENT}}
          </td>
        </tr>

        <!-- ── Footer ── -->
        <tr>
          <td style="background:#f8fafc;border-radius:0 0 16px 16px;padding:24px 40px;border-top:1px solid #e2e8f0;text-align:center">
            <p style="margin:0 0 8px;font-size:13px;color:#64748b">
              &copy; 2025 AquaFlow. All rights reserved.
            </p>
            <p style="margin:0 0 12px;font-size:12px;color:#94a3b8">
              You're receiving this email because you have an account with AquaFlow.
            </p>
            <p style="margin:0;font-size:12px">
              <a href="{{APP_URL}}" style="color:#0f4c81;text-decoration:none;font-weight:600">{{APP_URL}}</a>
              &nbsp;·&nbsp;
              <a href="{{APP_URL}}/settings" style="color:#64748b;text-decoration:none">Notification settings</a>
              &nbsp;·&nbsp;
              <a href="{{APP_URL}}/login" style="color:#64748b;text-decoration:none">Sign in</a>
            </p>
          </td>
        </tr>

      </table>
      <!-- /Card -->

    </td>
  </tr>
</table>

</body>
</html>
